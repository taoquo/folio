<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Folio Diagram Demo · Architecture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment: #F6F0EA;
      --ivory: #FBF7F3;
      --near-black: #191514;
      --olive: #5A4A43;
      --stone: #85776F;
      --brand: #B83D2E;
      --brand-tint: #F7E6E1;
      --border: #E9DED4;
      --serif: Charter, Georgia, Palatino, serif;
      --sans: var(--serif);
      --mono: "JetBrains Mono", "SF Mono", Consolas, "LXGW WenKai", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", monospace;
    }

    @page {
      size: A4;
      margin: 0;
    }

    html, body { min-height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--parchment);
      color: var(--near-black);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      background: var(--parchment);
      padding: 10mm 11mm 8mm;
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 8pt;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--stone);
    }

    h1 {
      font-size: 21pt;
      line-height: 1.12;
      font-weight: 500;
      letter-spacing: -0.4px;
      max-width: 14ch;
    }

    .lede {
      font-size: 9.4pt;
      line-height: 1.5;
      color: var(--olive);
      max-width: 44ch;
    }

    figure {
      margin-top: 0;
      border-top: 1px solid var(--border);
      padding-top: 3mm;
    }

    svg {
      width: 96%;
      margin: 0 auto;
      display: block;
      background: var(--parchment);
    }

    figcaption {
      margin-top: 3mm;
      font-size: 8.2pt;
      line-height: 1.48;
      color: var(--olive);
    }

    .note {
      margin-top: auto;
      padding-top: 3.5mm;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 7.4pt;
      line-height: 1.5;
      color: var(--stone);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media screen {
      body {
        padding: 28px;
        align-items: flex-start;
      }

      .page {
        box-shadow: 0 0 0 10px rgba(251, 247, 243, 0.82);
        border: 1px solid var(--border);
      }
    }

    @media print {
      html, body {
        min-height: auto;
      }

      body {
        display: block;
      }

      .page {
        width: auto;
        min-height: auto;
      }

      .note {
        margin-top: 4mm;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">Diagram Demo · Folio</p>
    <h1>Folio Document System Architecture</h1>
    <p class="lede">A single editorial path from prompt and materials through routing, templates, build scripts, and final artifacts. The focal node marks the point where Folio's house style becomes a concrete deliverable.</p>

    <figure>
      <svg viewBox="0 0 690 620" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
        <title id="title">Folio document system architecture</title>
        <desc id="desc">Inputs flow into routing, then template systems, then the build pipeline, ending in output artifacts.</desc>

        <defs>
          <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(25,21,20,0.08)"/>
          </pattern>
        </defs>

        <rect width="690" height="620" fill="#F6F0EA"/>
        <rect width="690" height="620" fill="url(#dots)" opacity="0.52"/>

        <!-- connectors -->
        <line x1="348" y1="124" x2="348" y2="156" stroke="#5A4A43" stroke-width="1.2"/>
        <path d="M344 150 L348 156 L352 150" fill="none" stroke="#5A4A43" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <line x1="348" y1="252" x2="348" y2="284" stroke="#B83D2E" stroke-width="1.4"/>
        <path d="M344 278 L348 284 L352 278" fill="none" stroke="#B83D2E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

        <line x1="268" y1="382" x2="268" y2="420" stroke="#5A4A43" stroke-width="1.2"/>
        <path d="M264 414 L268 420 L272 414" fill="none" stroke="#5A4A43" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <line x1="428" y1="382" x2="428" y2="420" stroke="#5A4A43" stroke-width="1.2"/>
        <path d="M424 414 L428 420 L432 414" fill="none" stroke="#5A4A43" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <line x1="268" y1="516" x2="348" y2="548" stroke="#5A4A43" stroke-width="1.2"/>
        <path d="M340 541 L348 548 L337 549" fill="none" stroke="#5A4A43" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <line x1="428" y1="516" x2="348" y2="548" stroke="#5A4A43" stroke-width="1.2"/>
        <path d="M359 549 L348 548 L356 541" fill="none" stroke="#5A4A43" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- labels -->
        <rect x="318" y="132" width="60" height="14" rx="2" fill="#F6F0EA"/>
        <text x="348" y="142" fill="#5A4A43" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">INTENT</text>

        <rect x="316" y="260" width="64" height="14" rx="2" fill="#F6F0EA"/>
        <text x="348" y="270" fill="#B83D2E" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">HOUSE STYLE</text>

        <rect x="230" y="392" width="76" height="14" rx="2" fill="#F6F0EA"/>
        <text x="268" y="402" fill="#5A4A43" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">LAYOUT PATH</text>

        <rect x="388" y="392" width="80" height="14" rx="2" fill="#F6F0EA"/>
        <text x="428" y="402" fill="#5A4A43" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">DIAGRAM PATH</text>

        <!-- node: inputs -->
        <rect x="252" y="56" width="192" height="68" rx="6" fill="#F6F0EA"/>
        <rect x="252" y="56" width="192" height="68" rx="6" fill="rgba(90,74,67,0.08)" stroke="#85776F" stroke-width="1"/>
        <text x="274" y="76" fill="#85776F" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">INPUTS</text>
        <text x="348" y="97" fill="#191514" font-size="15" font-weight="600" font-family="inherit" text-anchor="middle">Prompt + Materials</text>
        <text x="348" y="114" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">brief · facts · screenshots · logo</text>

        <!-- node: router -->
        <rect x="266" y="156" width="164" height="96" rx="6" fill="#F6F0EA"/>
        <rect x="266" y="156" width="164" height="96" rx="6" fill="rgba(25,21,20,0.03)" stroke="rgba(25,21,20,0.30)" stroke-width="1"/>
        <text x="288" y="176" fill="#85776F" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">ROUTER</text>
        <text x="348" y="198" fill="#191514" font-size="15" font-weight="600" font-family="inherit" text-anchor="middle">Decision Layer</text>
        <text x="348" y="216" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">doc type · language · material check</text>
        <text x="348" y="234" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">brand defaults · chart choice</text>

        <!-- focal node: template system -->
        <rect x="244" y="284" width="208" height="98" rx="6" fill="#F7E6E1" stroke="#B83D2E" stroke-width="1.1"/>
        <text x="266" y="304" fill="#B83D2E" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">FOLIO CORE</text>
        <text x="348" y="327" fill="#191514" font-size="16" font-weight="600" font-family="inherit" text-anchor="middle">Template System</text>
        <text x="348" y="345" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">8 document templates · 14 diagram types</text>
        <text x="348" y="363" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">tokens · typography · warm palette</text>

        <!-- left node -->
        <rect x="188" y="420" width="160" height="96" rx="6" fill="#FBF7F3" stroke="#191514" stroke-width="1"/>
        <text x="210" y="440" fill="#191514" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">DOCUMENTS</text>
        <text x="268" y="463" fill="#191514" font-size="15" font-weight="600" font-family="inherit" text-anchor="middle">Layout Build</text>
        <text x="268" y="481" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">HTML → PDF</text>
        <text x="268" y="499" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">page count · fonts · previews</text>

        <!-- right node -->
        <rect x="348" y="420" width="160" height="96" rx="6" fill="rgba(25,21,20,0.05)" stroke="#5A4A43" stroke-width="1"/>
        <text x="370" y="440" fill="#5A4A43" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">AUTOMATION</text>
        <text x="428" y="463" fill="#191514" font-size="15" font-weight="600" font-family="inherit" text-anchor="middle">Build Scripts</text>
        <text x="428" y="481" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">PPTX · PNG · ZIP</text>
        <text x="428" y="499" fill="#5A4A43" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">verify · package · artifacts</text>

        <!-- output node -->
        <rect x="254" y="548" width="188" height="54" rx="6" fill="rgba(90,74,67,0.08)" stroke="#85776F" stroke-width="1"/>
        <text x="276" y="568" fill="#85776F" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">OUTPUTS</text>
        <text x="348" y="588" fill="#191514" font-size="14" font-weight="600" font-family="inherit" text-anchor="middle">PDF · PPTX · PNG · folio.zip</text>
      </svg>

      <figcaption>Figure 1. The focal node is the template system: this is where content stops being raw material and becomes recognizably Folio. Routing decides what to make; the build path decides how it ships.</figcaption>
    </figure>
  </main>
</body>
</html>
